spring.application.name=prj_banhcay

# 1. Cấu hình kết nối PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

# Hiển thị các câu lệnh SQL xuống console để bạn dễ debug khi gọi API
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Định dạng ngôn ngữ SQL chuẩn cho PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.ai.google.genai.api-key=${GCP_API_KEY}